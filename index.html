<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Mixolve</title>
    <meta name="description" content="Minimal blank sheet with a frame." />
    <link rel="icon" type="image/png" href="./resources/favicon.png" />
    <link rel="apple-touch-icon" href="./resources/logo_1x1.png" />
    <link rel="stylesheet" href="./source/styles.css" />
    <script src="./source/links.js" defer></script>
    <script
      data-goatcounter="https://mixolve.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <main class="page">
      <section class="sheet" aria-label="Blank sheet">
        <div class="inner-frame" aria-label="Mixolve">
          <div class="frame-title" aria-label="Mixolve">
            <span class="frame-title-word" aria-hidden="true">
              <span class="frame-title-letter">M</span>
              <span class="frame-title-letter">I</span>
              <span class="frame-title-letter">X</span>
              <span class="frame-title-letter">O</span>
              <span class="frame-title-letter">L</span>
              <span class="frame-title-letter">V</span>
              <span class="frame-title-letter">E</span>
            </span>
          </div>
          <nav class="link-grid" aria-label="External links">
            <a
              class="link-button"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Drive"
              data-link-key="drive"
              data-goatcounter-click="drive"
              data-goatcounter-title="Drive"
            >
              DRIVE
            </a>
            <a
              class="link-button"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Ko-fi"
              data-link-key="cookies"
              data-goatcounter-click="cookies"
              data-goatcounter-title="Cookies"
            >
              COOKIES
            </a>
            <a
              class="link-button"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="GitHub"
              data-link-key="github"
              data-goatcounter-click="github"
              data-goatcounter-title="GitHub"
            >
              GITHUB
            </a>
            <a
              class="link-button"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Twitch"
              data-link-key="twitch"
              data-goatcounter-click="twitch"
              data-goatcounter-title="Twitch"
            >
              TWITCH
            </a>
            <a
              class="link-button"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="YouTube"
              data-link-key="youtube"
              data-goatcounter-click="utube"
              data-goatcounter-title="Utube"
            >
              YOUTUBE
            </a>
            <a
              class="link-button"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Instagram"
              data-link-key="insta"
              data-goatcounter-click="insta"
              data-goatcounter-title="Insta"
            >
              INSTA
            </a>
          </nav>
          <div class="hidden-panel">
            <div class="hidden-heading">PLUGINS/APPS/SCRIPTS</div>
            <a
              class="link-button hidden-sublink"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="vx"
              data-link-key="vx"
              data-goatcounter-click="plugin-vx"
              data-goatcounter-title="vx"
            >
              <span class="hidden-sublink-name">VX</span>
            </a>
            <a
              class="link-button hidden-sublink"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="ple"
              data-link-key="ple"
              data-goatcounter-click="plugin-ple"
              data-goatcounter-title="ple"
            >
              <span class="hidden-sublink-name">PLE</span>
            </a>
            <a
              class="link-button hidden-sublink"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="wbe"
              data-link-key="wbe"
              data-goatcounter-click="plugin-wbe"
              data-goatcounter-title="wbe"
            >
              <span class="hidden-sublink-name">WBE</span>
            </a>
            <a
              class="link-button hidden-sublink"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="luas-jsfxs"
              data-link-key="luas-jsfxs"
              data-goatcounter-click="plugin-luas-jsfxs"
              data-goatcounter-title="luas-jsfxs"
            >
              <span class="hidden-sublink-name">LUAS-JSFXS</span>
            </a>
            <div class="hidden-heading">UNLISTED-VIDEOS</div>
            <a
              class="link-button hidden-sublink"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Video 01"
              data-link-key="video-01"
              data-goatcounter-click="video-01"
              data-goatcounter-title="video-01"
            >
              VIDEO-01
            </a>
            <a
              class="link-button hidden-sublink"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Video 02"
              data-link-key="video-02"
              data-goatcounter-click="video-02"
              data-goatcounter-title="video-02"
            >
              VIDEO-02
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
