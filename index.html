<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixolve</title>
    <meta name="description" content="Minimal blank sheet with a frame." />
    <link rel="stylesheet" href="./styles.css" />
    <script
      data-goatcounter="https://mixolve.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <main class="page">
      <section class="sheet" aria-label="Blank sheet">
        <div class="inner-frame" aria-label="Mixolve">
          <div class="frame-title" aria-label="Mixolve">
            <span class="frame-title-word" aria-hidden="true">
              <span class="frame-title-letter">M</span>
              <span class="frame-title-letter">I</span>
              <span class="frame-title-letter">X</span>
              <span class="frame-title-letter">O</span>
              <span class="frame-title-letter">L</span>
              <span class="frame-title-letter">V</span>
              <span class="frame-title-letter">E</span>
            </span>
          </div>
          <nav class="link-grid" aria-label="External links">
            <a
              class="link-button"
              href="https://drive.google.com/drive/folders/1Wc72rHPUDhXbUAYgtxNf6LmNpq0SysWr"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Drive"
              data-goatcounter-click="drive"
              data-goatcounter-title="Drive"
            >
              DRIVE
            </a>
            <a
              class="link-button"
              href="https://ko-fi.com/mixolve"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Ko-fi"
              data-goatcounter-click="cookies"
              data-goatcounter-title="Cookies"
            >
              COOKIES
            </a>
            <a
              class="link-button"
              href="https://github.com/mixolve"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="GitHub"
              data-goatcounter-click="github"
              data-goatcounter-title="GitHub"
            >
              GITHUB
            </a>
            <a
              class="link-button"
              href="https://www.twitch.tv/mixolve"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Twitch"
              data-goatcounter-click="twitch"
              data-goatcounter-title="Twitch"
            >
              TWITCH
            </a>
            <a
              class="link-button"
              href="https://www.youtube.com/@mixolve"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="YouTube"
              data-goatcounter-click="utube"
              data-goatcounter-title="Utube"
            >
              UTUBE
            </a>
            <a
              class="link-button"
              href="https://www.instagram.com/mixolve/"
              target="_blank"
              rel="noreferrer noopener"
              aria-label="Instagram"
              data-goatcounter-click="insta"
              data-goatcounter-title="Insta"
            >
              INSTA
            </a>
          </nav>
          <details class="hidden-dropdown">
            <summary class="link-button link-button-hidden">HIDDEN</summary>
            <div class="hidden-panel">
              <a
                class="link-button hidden-link"
                href="https://drive.google.com/drive/folders/14RpqrSGxeArs27i3UopNbECr1VIwBBsK"
                target="_blank"
                rel="noreferrer noopener"
                aria-label="Multitracks"
                data-goatcounter-click="multitracks"
                data-goatcounter-title="Multitracks"
              >
                MULTITRACKS
              </a>
              <details class="hidden-subdropdown">
                <summary class="link-button hidden-link">PLUGINS-LATEST-VERSIONS</summary>
                <div class="hidden-subpanel">
                  <a
                    class="link-button hidden-sublink"
                    href="https://github.com/mixolve/mxe/tree/main/releases/V01.00"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="mxe"
                    data-goatcounter-click="plugin-mxe"
                    data-goatcounter-title="mxe"
                  >
                    mxe
                  </a>
                  <a
                    class="link-button hidden-sublink"
                    href="https://github.com/mixolve/spe/tree/main/releases/V01.00"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="spe"
                    data-goatcounter-click="plugin-spe"
                    data-goatcounter-title="spe"
                  >
                    spe
                  </a>
                  <a
                    class="link-button hidden-sublink"
                    href="https://github.com/mixolve/wbe/tree/main/releases/V01.00"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="wbe"
                    data-goatcounter-click="plugin-wbe"
                    data-goatcounter-title="wbe"
                  >
                    wbe
                  </a>
                  <a
                    class="link-button hidden-sublink"
                    href="https://github.com/mixolve/eqe/tree/main/releases/V01.01"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="eqe"
                    data-goatcounter-click="plugin-eqe"
                    data-goatcounter-title="eqe"
                  >
                    eqe
                  </a>
                  <a
                    class="link-button hidden-sublink"
                    href="https://github.com/mixolve/ple/tree/main/releases/V01.00"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="ple"
                    data-goatcounter-click="plugin-ple"
                    data-goatcounter-title="ple"
                  >
                    ple
                  </a>
                </div>
              </details>
              <details class="hidden-subdropdown">
                <summary class="link-button hidden-link">UNLISTED-VIDEOS</summary>
                <div class="hidden-subpanel">
                  <a
                    class="link-button hidden-sublink"
                    href="https://www.youtube.com/watch?v=XIG4kJcT0zI"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="Video 01"
                    data-goatcounter-click="video-01"
                    data-goatcounter-title="video-01"
                  >
                    video-01
                  </a>
                  <a
                    class="link-button hidden-sublink"
                    href="https://www.youtube.com/watch?v=mcVGuTtk4sI"
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label="Video 02"
                    data-goatcounter-click="video-02"
                    data-goatcounter-title="video-02"
                  >
                    video-02
                  </a>
                </div>
              </details>
            </div>
          </details>
        </div>
      </section>
    </main>
  </body>
</html>
